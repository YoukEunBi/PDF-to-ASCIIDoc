<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
<title>PDF → AsciiDoc 변환기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  header {
    padding: 18px 24px 12px;
    border-bottom: 1px solid #313244;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #cba6f7; letter-spacing: .3px; }
  header p  { font-size: 12px; color: #6c7086; margin-top: 2px; }

  main { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; gap: 16px; overflow: hidden; }

  /* ── 드롭존 ── */
  #drop-zone {
    border: 2px dashed #45475a;
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    flex-shrink: 0;
  }
  #drop-zone.drag-over { border-color: #cba6f7; background: #313244; }
  #drop-zone svg { width: 48px; height: 48px; opacity: .4; margin-bottom: 10px; }
  #drop-zone p   { color: #6c7086; font-size: 14px; }
  #drop-zone em  { color: #89b4fa; font-style: normal; text-decoration: underline; cursor: pointer; }

  /* ── 파일 목록 ── */
  #file-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #313244;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
  }
  .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .status { font-size: 12px; flex-shrink: 0; }
  .file-item .remove { cursor: pointer; opacity: .5; transition: opacity .1s; padding: 2px 4px; }
  .file-item .remove:hover { opacity: 1; }
  .status-wait     { color: #6c7086; }
  .status-converting { color: #f9e2af; }
  .status-done     { color: #a6e3a1; }
  .status-error    { color: #f38ba8; }

  /* ── 옵션 바 ── */
  #options {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #options label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #options input[type=checkbox] { accent-color: #cba6f7; width: 15px; height: 15px; cursor: pointer; }
  #output-dir-btn {
    font-size: 12px;
    background: #313244;
    border: 1px solid #45475a;
    border-radius: 6px;
    color: #cdd6f4;
    padding: 5px 10px;
    cursor: pointer;
    transition: background .1s;
  }
  #output-dir-btn:hover { background: #45475a; }
  #output-dir-label { font-size: 11px; color: #6c7086; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── 하단 버튼 ── */
  footer {
    padding: 14px 24px;
    border-top: 1px solid #313244;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #clear-btn {
    background: transparent;
    border: 1px solid #45475a;
    border-radius: 8px;
    color: #6c7086;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    transition: background .1s, color .1s;
  }
  #clear-btn:hover { background: #313244; color: #cdd6f4; }
  #convert-btn {
    flex: 1;
    background: #cba6f7;
    border: none;
    border-radius: 8px;
    color: #1e1e2e;
    padding: 11px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  #convert-btn:hover  { background: #d9b3ff; }
  #convert-btn:active { background: #b58ae0; }
  #convert-btn:disabled { opacity: .4; cursor: not-allowed; }
  #status-msg { font-size: 12px; color: #6c7086; }
</style>
</head>
<body>

<header>
  <h1>PDF → AsciiDoc 변환기</h1>
  <p>PDF 파일을 드래그하거나 클릭해서 추가하세요</p>
</header>

<main>
  <!-- 드롭존 -->
  <div id="drop-zone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m.75 12l3 3m0 0l3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
    </svg>
    <p>PDF 파일을 여기에 드래그하거나<br><em>클릭해서 파일 선택</em></p>
  </div>

  <!-- 파일 목록 -->
  <div id="file-list"></div>

  <!-- 옵션 -->
  <div id="options">
    <label><input type="checkbox" id="opt-html"> HTML도 함께 생성</label>
    <button id="output-dir-btn">출력 폴더 변경</button>
    <span id="output-dir-label">기본: PDF와 같은 폴더</span>
  </div>
</main>

<footer>
  <button id="clear-btn">목록 지우기</button>
  <button id="convert-btn" disabled>변환 시작</button>
  <span id="status-msg"></span>
</footer>

<script src="renderer.js"></script>
</body>
</html>
